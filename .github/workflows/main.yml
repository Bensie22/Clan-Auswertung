name: Clan Auswertung Automatisierung

on:
  schedule:
    - cron: '0 */4 * * *'    # Radar-Update: Alle 4 Stunden (0, 4, 8, 12, 16, 20 UTC)
    - cron: '30 10 * * 1'    # E-Mail-Update: Jeden Montag um 10:30 UTC (11:30 Uhr MEZ)
  workflow_dispatch:

# HIER IST DIE KORREKTUR: Global und mit Anführungszeichen
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-auswertung:
    runs-on: ubuntu-latest
    
    env:
      SUPERCELL_API_TOKEN: ${{ secrets.SUPERCELL_API_TOKEN }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Repository klonen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv

      - name: Auswertung starten
        run: python Master_Auswertung_GitHub.py 

      - name: Commit und Push der neuen Dateien
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add .
          git commit -m "📊 Automatische Clan-Auswertung aktualisiert" || echo "Keine Änderungen zum Speichern"
          git push 
