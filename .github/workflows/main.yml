name: Clan Auswertung Automatisierung

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-preview-handy:
    runs-on: ubuntu-latest

    env:
      SUPERCELL_API_TOKEN: ${{ secrets.SUPERCELL_API_TOKEN }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      IMPRESSUM_SITE_NAME: ${{ secrets.IMPRESSUM_SITE_NAME }}
      IMPRESSUM_OWNER_NAME: ${{ secrets.IMPRESSUM_OWNER_NAME }}
      IMPRESSUM_STREET: ${{ secrets.IMPRESSUM_STREET }}
      IMPRESSUM_CITY: ${{ secrets.IMPRESSUM_CITY }}
      IMPRESSUM_PHONE: ${{ secrets.IMPRESSUM_PHONE }}
      IMPRESSUM_EMAIL: ${{ secrets.IMPRESSUM_EMAIL }}
      IMPRESSUM_WEBSITE_URL: ${{ secrets.IMPRESSUM_WEBSITE_URL }}
      IMPRESSUM_RESPONSIBLE_NAME: ${{ secrets.IMPRESSUM_RESPONSIBLE_NAME }}
      IMPRESSUM_RESPONSIBLE_STREET: ${{ secrets.IMPRESSUM_RESPONSIBLE_STREET }}
      IMPRESSUM_RESPONSIBLE_CITY: ${{ secrets.IMPRESSUM_RESPONSIBLE_CITY }}
      RUN_MODE: weekly

    steps:
      - name: Repository klonen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv

      - name: Auswertung starten
        run: python Master_Auswertung_GitHub.py
      - name: Commit und Push der Preview-Dateien
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add .
          git commit -m "📱 Handy-Preview aktualisiert" || echo "Keine Änderungen zum Speichern"
          git push
