<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Clan Control Center</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .red { border-left: 5px solid red; }
        .yellow { border-left: 5px solid orange; }
        .green { border-left: 5px solid lime; }

        button {
            margin-top: 5px;
            margin-right: 5px;
            padding: 5px 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h1>🔥 Clan Control Center</h1>

<div id="commander" class="card"></div>
<div id="smart" class="card yellow"></div>
<div id="coaching" class="card"></div>

<script>

async function loadData() {
    const commander = await fetch("commander_output.json").then(r => r.json());
    const smart = await fetch("smart_output.json").then(r => r.json());
    const coaching = await fetch("coaching_output.json").then(r => r.json());

    // 👑 STRATEGIE
    document.getElementById("commander").innerHTML =
    `
    <h2>👑 Strategie</h2>

    <div class="card red">
        <h3>🔴 Remove</h3>
        ${commander.remove.map(name => `
            <div>
                ${name}<br>
                <button onclick="warnPlayer('${name}')">⚠️ Warn</button>
                <button onclick="kickPlayer('${name}')">❌ Kick</button>
                <br><br>
            </div>
        `).join("")}
    </div>

    <div class="card green">
        <h3>🟢 Core</h3>
        ${commander.core.map(name => `
            <div>
                ${name}<br>
                <button onclick="promotePlayer('${name}')">👑 Promote</button>
                <br><br>
            </div>
        `).join("")}
    </div>
    `;

    // 🟡 RISIKO
    let smartHTML = "<h2>🟡 Risiko</h2>";

    smart.forEach(p => {
        if (p.status === "RISIKO") {
            smartHTML += `<div>${p.name}</div>`;
        }
    });

    document.getElementById("smart").innerHTML = smartHTML;

    // 🎯 COACHING
    let coachingHTML = "<h2>🎯 Coaching</h2>";

    coaching.forEach(p => {
        coachingHTML += `<div>${p.name}: ${p.tip}</div>`;
    });

    document.getElementById("coaching").innerHTML = coachingHTML;
}


// 🔴 Aktionen (aktuell Demo)
function warnPlayer(name) {
    alert("⚠️ Warnung für " + name);
}

function kickPlayer(name) {
    alert("❌ Kick für " + name);
}

function promotePlayer(name) {
    alert("👑 Beförderung für " + name);
}


// ▶️ Start
loadData();

</script>

</body>
</html>
