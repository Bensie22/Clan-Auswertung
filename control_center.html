<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Clan Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
            margin: 0;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .section-card {
            background: #1e293b;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
        }

        .card {
            background: #273449;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .red { border-left: 5px solid #ef4444; }
        .yellow { border-left: 5px solid #f59e0b; }
        .green { border-left: 5px solid #22c55e; }

        .player-row {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .player-row:last-child {
            border-bottom: none;
        }

        .player-name {
            font-weight: bold;
            font-size: 16px;
        }

        .player-meta {
            font-size: 13px;
            color: #cbd5e1;
            margin-top: 4px;
            line-height: 1.5;
        }

        .button-row {
            margin-top: 8px;
        }

        button {
            margin-top: 5px;
            margin-right: 6px;
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-warn { background: #f59e0b; color: black; }
        .btn-kick { background: #ef4444; color: white; }
        .btn-promote { background: #22c55e; color: black; }
        .btn-done { background: #38bdf8; color: black; }
        .btn-pending { background: #94a3b8; color: black; }

        .muted {
            color: #94a3b8;
            font-size: 14px;
        }

        #toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            min-width: 260px;
            max-width: 420px;
            padding: 12px 16px;
            border-radius: 10px;
            background: #111827;
            color: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: none;
            z-index: 9999;
        }

        #toast.success {
            border-left: 5px solid #22c55e;
        }

        #toast.error {
            border-left: 5px solid #ef4444;
        }

        #toast.info {
            border-left: 5px solid #38bdf8;
        }

        .tag-badge {
            display: inline-block;
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            margin-top: 4px;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 4px;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .status-done {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .filter-btn {
            background: #334155;
            color: white;
        }

        .filter-btn.active {
            background: #38bdf8;
            color: black;
        }
    </style>
</head>

<body>

<h1>🔥 Clan Control Center</h1>

<div id="commander" class="section-card"></div>
<div id="smart" class="section-card yellow"></div>
<div id="coaching" class="section-card"></div>
<div id="actions" class="section-card"></div>

<div id="toast"></div>

<script>
const API_BASE = "http://127.0.0.1:5000/api";
let currentActionFilter = "pending";
let cachedActions = [];

// API-Key aus localStorage laden (einmalig eingeben, dann gespeichert)
function getApiKey() {
    let key = localStorage.getItem("action_api_key") || "";
    if (!key) {
        key = prompt("Bitte API-Key eingeben (leer lassen wenn keiner gesetzt):") || "";
        if (key) localStorage.setItem("action_api_key", key);
    }
    return key;
}

function getAuthHeaders() {
    const key = localStorage.getItem("action_api_key") || "";
    return key ? { "Content-Type": "application/json", "X-API-Key": key } : { "Content-Type": "application/json" };
}

function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = type;
    toast.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => {
        toast.style.display = "none";
    }, 3000);
}

function escapeHtml(value) {
    if (value === null || value === undefined) return "";
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function safeArray(value) {
    return Array.isArray(value) ? value : [];
}

async function executeClanAction(action, playerTag, playerName, extra = {}) {
    try {
        const response = await fetch(`${API_BASE}/actions/execute`, {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify({
                action: action,
                player_tag: playerTag,
                player_name: playerName,
                action_source: "control_center",
                ...extra
            })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.message || "Aktion fehlgeschlagen");
        }

        showToast(`✅ ${result.message}`, "success");
        await loadActions();
    } catch (error) {
        console.error("ACTION ERROR:", error);
        showToast(`❌ ${error.message}`, "error");
    }
}

document.addEventListener("click", function(e) {
    const btn = e.target.closest(".action-btn");
    if (!btn) return;

    const action = btn.dataset.action;
    const tag = btn.dataset.tag;
    const name = btn.dataset.name;
    const reason = btn.dataset.reason || "";

    if (action === "warn") {
        if (!confirm(`Soll ${name} wirklich verwarnt werden?`)) return;
        executeClanAction("warn", tag, name, { reason });
    } else if (action === "kick") {
        if (!confirm(`Soll ${name} wirklich als Kick-Fall gespeichert werden?`)) return;
        executeClanAction("kick", tag, name, { reason });
    } else if (action === "promote") {
        if (!confirm(`Soll ${name} wirklich befördert werden?`)) return;
        executeClanAction("promote", tag, name, { target_role: "elder", reason });
    }
});

async function updateActionStatus(actionId, status) {
    try {
        const response = await fetch(`${API_BASE}/actions/${actionId}`, {
            method: "PATCH",
            headers: getAuthHeaders(),
            body: JSON.stringify({ status })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.detail || result.message || "Status konnte nicht geändert werden");
        }

        showToast(`✅ ${result.message}`, "success");
        await loadActions();
    } catch (error) {
        console.error("STATUS ERROR:", error);
        showToast(`❌ ${error.message}`, "error");
    }
}

function markActionDone(actionId) {
    updateActionStatus(actionId, "done");
}

function markActionPending(actionId) {
    updateActionStatus(actionId, "pending");
}

function setActionFilter(filter) {
    currentActionFilter = filter;
    renderActions({ actions: cachedActions });
}

function renderCommander(commander) {
    const removeList = safeArray(commander.remove);
    const coreList = safeArray(commander.core);

    const removeHtml = removeList.length
        ? removeList.map(player => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(player.name)}</div>
                <div class="tag-badge">${escapeHtml(player.player_tag || "-")}</div>
                <div class="player-meta">
                    Rolle: ${escapeHtml(player.role || "-")}<br>
                    Score: ${escapeHtml(player.score ?? "-")}<br>
                    Strikes: ${escapeHtml(player.strikes ?? 0)}<br>
                    Grund: ${escapeHtml(player.reason || "Kein Grund angegeben")}
                </div>
                <div class="button-row">
                    <button class="btn-warn action-btn" data-action="warn" data-tag="${escapeHtml(player.player_tag || "")}" data-name="${escapeHtml(player.name || "")}" data-reason="${escapeHtml(player.reason || "")}">⚠️ Warn</button>
                    <button class="btn-kick action-btn" data-action="kick" data-tag="${escapeHtml(player.player_tag || "")}" data-name="${escapeHtml(player.name || "")}" data-reason="${escapeHtml(player.reason || "")}">❌ Kick</button>
                </div>
            </div>
        `).join("")
        : `<div class="muted">Keine Kandidaten für Remove.</div>`;

    const coreHtml = coreList.length
        ? coreList.map(player => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(player.name)}</div>
                <div class="tag-badge">${escapeHtml(player.player_tag || "-")}</div>
                <div class="player-meta">
                    Rolle: ${escapeHtml(player.role || "-")}<br>
                    Score: ${escapeHtml(player.score ?? "-")}<br>
                    Spenden: ${escapeHtml(player.donations ?? 0)}<br>
                    Grund: ${escapeHtml(player.reason || "Kein Grund angegeben")}
                </div>
                <div class="button-row">
                    <button class="btn-promote action-btn" data-action="promote" data-tag="${escapeHtml(player.player_tag || "")}" data-name="${escapeHtml(player.name || "")}" data-reason="${escapeHtml(player.reason || "")}">👑 Promote</button>
                </div>
            </div>
        `).join("")
        : `<div class="muted">Keine Kandidaten für Promote.</div>`;

    document.getElementById("commander").innerHTML = `
        <h2>👑 Strategie</h2>

        <div class="card red">
            <h3>🔴 Remove</h3>
            ${removeHtml}
        </div>

        <div class="card green">
            <h3>🟢 Core</h3>
            ${coreHtml}
        </div>
    `;
}

function renderSmart(smart) {
    let smartHTML = "<h2>🟡 Risiko</h2>";

    const riskPlayers = safeArray(smart).filter(p => p.status === "RISIKO");

    if (!riskPlayers.length) {
        smartHTML += `<div class="muted">Keine aktiven Risiko-Fälle.</div>`;
    } else {
        smartHTML += riskPlayers.map(p => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(p.name)}</div>
                <div class="player-meta">
                    Score: ${escapeHtml(p.score ?? "-")}<br>
                    Status: ${escapeHtml(p.status || "-")}
                </div>
            </div>
        `).join("");
    }

    document.getElementById("smart").innerHTML = smartHTML;
}

function renderCoaching(coaching) {
    let coachingHTML = "<h2>🎯 Coaching</h2>";

    const coachingList = safeArray(coaching);

    if (!coachingList.length) {
        coachingHTML += `<div class="muted">Keine Coaching-Empfehlungen vorhanden.</div>`;
    } else {
        coachingHTML += coachingList.map(p => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(p.name)}</div>
                <div class="player-meta">
                    Score: ${escapeHtml(p.score ?? "-")}<br>
                    Tipp: ${escapeHtml(p.tip || "")}
                </div>
            </div>
        `).join("");
    }

    document.getElementById("coaching").innerHTML = coachingHTML;
}

function renderActions(data) {
    const actions = safeArray(data.actions);
    cachedActions = actions;

    let filtered = actions;
    if (currentActionFilter === "pending") {
        filtered = actions.filter(a => a.status === "pending");
    } else if (currentActionFilter === "done") {
        filtered = actions.filter(a => a.status === "done");
    }

    let html = `
        <h2>📌 Aktionen</h2>
        <div class="filter-row">
            <button class="filter-btn ${currentActionFilter === "all" ? "active" : ""}" onclick="setActionFilter('all')">Alle</button>
            <button class="filter-btn ${currentActionFilter === "pending" ? "active" : ""}" onclick="setActionFilter('pending')">Pending</button>
            <button class="filter-btn ${currentActionFilter === "done" ? "active" : ""}" onclick="setActionFilter('done')">Done</button>
        </div>
    `;

    if (!filtered.length) {
        html += `<div class="muted">Keine Aktionen in diesem Filter.</div>`;
    } else {
        html += filtered.map(a => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(a.player_name)}</div>
                <div class="tag-badge">${escapeHtml(a.player_tag || "-")}</div>
                <div class="player-meta">
                    Aktion: ${escapeHtml(a.action)}<br>
                    Quelle: ${escapeHtml(a.action_source || "-")}<br>
                    Grund: ${escapeHtml(a.reason || "Kein Grund angegeben")}<br>
                    Erstellt: ${escapeHtml(a.timestamp || "-")}<br>
                    Status:
                    <span class="status-badge ${a.status === "done" ? "status-done" : "status-pending"}">
                        ${escapeHtml(a.status || "-")}
                    </span>
                </div>
                <div class="button-row">
                    ${a.status === "pending"
                        ? `<button class="btn-done" onclick="markActionDone('${a.id}')">✅ Done</button>`
                        : `<button class="btn-pending" onclick="markActionPending('${a.id}')">↩️ Pending</button>`
                    }
                </div>
            </div>
        `).join("");
    }

    document.getElementById("actions").innerHTML = html;
}

async function loadActions() {
    try {
        const response = await fetch(`${API_BASE}/actions`);
        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.message || "Aktionen konnten nicht geladen werden");
        }

        renderActions(result);
    } catch (error) {
        console.error("LOAD ACTIONS ERROR:", error);
        document.getElementById("actions").innerHTML = `
            <h2>📌 Aktionen</h2>
            <div class="muted">Action API nicht erreichbar.</div>
        `;
    }
}

async function loadData() {
    try {
        const [commander, smart, coaching] = await Promise.all([
            fetch("commander_output.json").then(r => r.json()),
            fetch("smart_output.json").then(r => r.json()),
            fetch("coaching_output.json").then(r => r.json())
        ]);

        renderCommander(commander);
        renderSmart(smart);
        renderCoaching(coaching);
    } catch (error) {
        console.error("Load error:", error);
        showToast("❌ Fehler beim Laden der Dashboard-Daten", "error");
    }
}

loadData();
loadActions();
</script>

</body>
</html>
