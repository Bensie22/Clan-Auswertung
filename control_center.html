<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Clan Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
            margin: 0;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .section-card {
            background: #1e293b;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
        }

        .card {
            background: #273449;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .red { border-left: 5px solid #ef4444; }
        .yellow { border-left: 5px solid #f59e0b; }
        .green { border-left: 5px solid #22c55e; }

        .player-row {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .player-row:last-child {
            border-bottom: none;
        }

        .player-name {
            font-weight: bold;
            font-size: 16px;
        }

        .player-meta {
            font-size: 13px;
            color: #cbd5e1;
            margin-top: 4px;
            line-height: 1.5;
        }

        .button-row {
            margin-top: 8px;
        }

        button {
            margin-top: 5px;
            margin-right: 6px;
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-warn { background: #f59e0b; color: black; }
        .btn-kick { background: #ef4444; color: white; }
        .btn-promote { background: #22c55e; color: black; }

        .muted {
            color: #94a3b8;
            font-size: 14px;
        }

        #toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            min-width: 260px;
            max-width: 420px;
            padding: 12px 16px;
            border-radius: 10px;
            background: #111827;
            color: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: none;
            z-index: 9999;
        }

        #toast.success {
            border-left: 5px solid #22c55e;
        }

        #toast.error {
            border-left: 5px solid #ef4444;
        }

        #toast.info {
            border-left: 5px solid #38bdf8;
        }

        .tag-badge {
            display: inline-block;
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>

<body>

<h1>🔥 Clan Control Center</h1>

<div id="commander" class="section-card"></div>
<div id="smart" class="section-card yellow"></div>
<div id="coaching" class="section-card"></div>

<div id="toast"></div>

<script>
function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = type;
    toast.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => {
        toast.style.display = "none";
    }, 3000);
}

function escapeHtml(value) {
    if (value === null || value === undefined) return "";
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function safeArray(value) {
    return Array.isArray(value) ? value : [];
}

function warnPlayer(playerTag, playerName) {
    console.log("WARN", { playerTag, playerName });
    showToast(`⚠️ Warnung vorbereitet für ${playerName} (${playerTag})`, "info");
}

function kickPlayer(playerTag, playerName) {
    console.log("KICK", { playerTag, playerName });
    showToast(`❌ Kick vorbereitet für ${playerName} (${playerTag})`, "error");
}

function promotePlayer(playerTag, playerName) {
    console.log("PROMOTE", { playerTag, playerName });
    showToast(`👑 Beförderung vorbereitet für ${playerName} (${playerTag})`, "success");
}

function renderCommander(commander) {
    const removeList = safeArray(commander.remove);
    const coreList = safeArray(commander.core);

    const removeHtml = removeList.length
        ? removeList.map(player => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(player.name)}</div>
                <div class="tag-badge">${escapeHtml(player.player_tag || "-")}</div>
                <div class="player-meta">
                    Rolle: ${escapeHtml(player.role || "-")}<br>
                    Score: ${escapeHtml(player.score ?? "-")}<br>
                    Strikes: ${escapeHtml(player.strikes ?? 0)}<br>
                    Grund: ${escapeHtml(player.reason || "Kein Grund angegeben")}
                </div>
                <div class="button-row">
                    <button class="btn-warn" onclick="warnPlayer('${String(player.player_tag || "").replaceAll("'", "\\'")}', '${String(player.name || "").replaceAll("'", "\\'")}')">⚠️ Warn</button>
                    <button class="btn-kick" onclick="kickPlayer('${String(player.player_tag || "").replaceAll("'", "\\'")}', '${String(player.name || "").replaceAll("'", "\\'")}')">❌ Kick</button>
                </div>
            </div>
        `).join("")
        : `<div class="muted">Keine Kandidaten für Remove.</div>`;

    const coreHtml = coreList.length
        ? coreList.map(player => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(player.name)}</div>
                <div class="tag-badge">${escapeHtml(player.player_tag || "-")}</div>
                <div class="player-meta">
                    Rolle: ${escapeHtml(player.role || "-")}<br>
                    Score: ${escapeHtml(player.score ?? "-")}<br>
                    Spenden: ${escapeHtml(player.donations ?? 0)}<br>
                    Grund: ${escapeHtml(player.reason || "Kein Grund angegeben")}
                </div>
                <div class="button-row">
                    <button class="btn-promote" onclick="promotePlayer('${String(player.player_tag || "").replaceAll("'", "\\'")}', '${String(player.name || "").replaceAll("'", "\\'")}')">👑 Promote</button>
                </div>
            </div>
        `).join("")
        : `<div class="muted">Keine Kandidaten für Promote.</div>`;

    document.getElementById("commander").innerHTML = `
        <h2>👑 Strategie</h2>

        <div class="card red">
            <h3>🔴 Remove</h3>
            ${removeHtml}
        </div>

        <div class="card green">
            <h3>🟢 Core</h3>
            ${coreHtml}
        </div>
    `;
}

function renderSmart(smart) {
    let smartHTML = "<h2>🟡 Risiko</h2>";

    const riskPlayers = safeArray(smart).filter(p => p.status === "RISIKO");

    if (!riskPlayers.length) {
        smartHTML += `<div class="muted">Keine aktiven Risiko-Fälle.</div>`;
    } else {
        smartHTML += riskPlayers.map(p => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(p.name)}</div>
                <div class="player-meta">
                    Score: ${escapeHtml(p.score ?? "-")}<br>
                    Status: ${escapeHtml(p.status || "-")}
                </div>
            </div>
        `).join("");
    }

    document.getElementById("smart").innerHTML = smartHTML;
}

function renderCoaching(coaching) {
    let coachingHTML = "<h2>🎯 Coaching</h2>";

    const coachingList = safeArray(coaching);

    if (!coachingList.length) {
        coachingHTML += `<div class="muted">Keine Coaching-Empfehlungen vorhanden.</div>`;
    } else {
        coachingHTML += coachingList.map(p => `
            <div class="player-row">
                <div class="player-name">${escapeHtml(p.name)}</div>
                <div class="player-meta">
                    Score: ${escapeHtml(p.score ?? "-")}<br>
                    Tipp: ${escapeHtml(p.tip || "")}
                </div>
            </div>
        `).join("");
    }

    document.getElementById("coaching").innerHTML = coachingHTML;
}

async function loadData() {
    try {
        const [commander, smart, coaching] = await Promise.all([
            fetch("commander_output.json").then(r => r.json()),
            fetch("smart_output.json").then(r => r.json()),
            fetch("coaching_output.json").then(r => r.json())
        ]);

        renderCommander(commander);
        renderSmart(smart);
        renderCoaching(coaching);
    } catch (error) {
        console.error("Load error:", error);
        showToast("❌ Fehler beim Laden der Dashboard-Daten", "error");
    }
}

loadData();
</script>

</body>
</html>
